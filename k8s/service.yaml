apiVersion: v1
kind: Service
metadata:
  name: kickflip
  namespace: kickflip
spec:
  selector:
    app: kickflip
  ports:
    - port: 80
      targetPort: 8000
  # ClusterIP keeps it internal. Switch to LoadBalancer or add an
  # Ingress below if you want it reachable outside the cluster.
  type: ClusterIP
